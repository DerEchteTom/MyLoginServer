server {
    listen 80;
    index index.php;

    location / {
        root /var/www/html;
        index index.php;
        try_files $uri $uri/ /index.php;
    }

    location ~ \.php$ {
        root /var/www/html;
        fastcgi_pass php:9000;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html$fastcgi_script_name;
    }
}