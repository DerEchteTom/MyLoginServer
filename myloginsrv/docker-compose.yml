version: '3'
services:
  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - .:/var/www/html
    depends_on:
      - php
  php:
    container_name: myloginsrv-php
    image: php:8.2-fpm
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
